version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      commit-message:
          prefix: "chore(deps)"
      labels:
          - "dependencies"
          - "github-actions"

    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      open-pull-requests-limit: 5
      commit-message:
          prefix: "chore(deps)"
      labels:
          - "dependencies"
          - "npm"
      allow:
          - dependency-type: "direct"
