name: Prepare Release PR

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Semver without v, e.g. 1.0.0"
                required: true
                type: string

permissions:
    contents: write
    pull-requests: write

jobs:
    prepare-pr:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout main
              uses: actions/checkout@v4
              with:
                  ref: main
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Update package.json version
              run: |
                  node -e "const fs=require('fs'); const p=require('./package.json'); p.version='${{ inputs.version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"

            - name: Install dependencies
              run: npm ci

            - name: Build dist
              run: npm run build

            - name: Verify build output
              run: |
                  test -f action.yml
                  test -f dist/index.js

            - name: Commit release branch
              run: |
                  ver="${{ inputs.version }}"
                  branch="release/v${ver}"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git checkout -b "$branch"
                  git add package.json action.yml dist src README.md .github/workflows

                  if git diff --cached --quiet; then
                    echo "No changes to commit"
                    exit 1
                  fi

                  git commit -m "chore(release): v${ver}"
                  git push origin "$branch" --force

            - name: Open Pull Request
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh pr create \
                    --base main \
                    --head "release/v${{ inputs.version }}" \
                    --title "chore(release): v${{ inputs.version }}" \
                    --body "This PR prepares release v${{ inputs.version }} for GitHub Action." \
                    --label "release"
