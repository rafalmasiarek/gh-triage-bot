name: Release on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(release): v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify required files
        run: |
          test -f action.yml
          test -f dist/index.js

      - name: Create and push version tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PATCH_TAG="v${VERSION}"
          MAJOR_MINOR_TAG="v$(echo "$VERSION" | cut -d. -f1,2)"
          MAJOR_TAG="v$(echo "$VERSION" | cut -d. -f1)"

          if git rev-parse "$PATCH_TAG" >/dev/null 2>&1; then
            echo "Tag $PATCH_TAG already exists"
            exit 1
          fi

          git tag "$PATCH_TAG"
          git tag -f "$MAJOR_MINOR_TAG"
          git tag -f "$MAJOR_TAG"

          git push origin "$PATCH_TAG"
          git push origin "refs/tags/$MAJOR_MINOR_TAG" --force
          git push origin "refs/tags/$MAJOR_TAG" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            action.yml
            dist/index.js
            package.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
